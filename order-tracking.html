<main class="order-tracking-main container">
  <div class="tracking-card">
    <h2>Track Your Order</h2>
    <p style="text-align:center; color:var(--text-muted); margin-bottom:1.5rem;">Enter your phone number to find your orders</p>
    <form id="order-tracking-form">
      <input type="tel" id="tracking-phone" placeholder="01xxxxxxxxx" class="review-input" style="width:100%; margin-bottom:12px;">
      <button type="submit" class="action-add-to-cart-btn" style="width:100%;">Find My Orders</button>
    </form>
    <div id="tracking-result" style="display:none; margin-top:1.5rem;"></div>
  </div>
</main>
