<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#D8A0A8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siraj Candles | Affordable Luxury For Everyday Life</title>
    <meta name="description" content="Handcrafted home fragrances and self-care essentials made to bring comfort, beauty, and unforgettable scents into your daily moments.">
    <meta property="og:title" content="Siraj Candles | Affordable Luxury For Everyday Life">
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="assets/js/tracking.js" defer></script>
</head>
<body data-page="home">

    <!-- Announcement Ribbon -->
    <div class="announcement-ribbon" id="announcement-ribbon"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Open navigation menu">
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>

            <a href="index.html" class="logo">
                <span class="logo-siraj">SIRAJ</span>
                <span class="logo-candles">CANDLES</span>
            </a>
            
            <ul class="nav-links">
                <li><a href="index.html" class="active"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="products.html"><i class="fas fa-box-open"></i> Products</a></li>
                <li><a href="bundles.html"><i class="fas fa-gift"></i> Bundles</a></li>
                <li><a href="order-tracking.html"><i class="fas fa-truck"></i> Track Order</a></li>
            </ul>
            
            <div class="nav-icons">
                <button id="search-toggle" aria-label="Search"><i class="fas fa-search"></i></button>
                <button id="cart-toggle" class="cart-icon-button" aria-label="View cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" style="visibility: hidden; opacity: 0;">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu & Modals -->
    <div class="mobile-nav-menu" id="mobile-nav-menu"></div>

    <div id="cart-dropdown" class="cart-dropdown">
        <h3 class="dropdown-header">Your Cart</h3>
        <div class="cart-items-list"></div>
        <div class="cart-summary"><p>Total: <span id="cart-total">0.00 EGP</span></p></div>
        <div class="cart-dropdown-actions">
            <a href="shopcart.html" class="view-cart-btn">View Cart</a>
            <a href="checkout.html" class="checkout-btn-small">Checkout</a>
        </div>
    </div>

    <div id="search-modal" class="search-modal">
        <div class="search-content">
            <button class="close-search">&times;</button>
            <input type="text" id="search-input" placeholder="Search for product name or category...">
            <div id="search-results" class="search-results"></div>
        </div>
    </div>
    
    <!-- Main Content -->
    <main>
        <!-- Hero Carousel -->
        <section class="hero-section" id="dynamic-hero">
            <div class="hero-content">
                <h1 class="hero-title" id="hero-title" style="display:none;"></h1>
                <p class="hero-subtitle" id="hero-subtitle" style="display:none;"></p>
                <a href="/products.html" class="shop-now-btn" id="hero-button">Shop Now</a>
            </div>
        </section>

        <!-- The Dynamic Layout Engine will inject all other sections (Trust, About, Best Sellers, Bundles) right here -->
        <div id="dynamic-sections-container"></div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <!-- Content will be injected dynamically from SiteSettings by site.js -->
    </footer>

    <script type="module" src="assets/js/site.js"></script>
</body>
</html>
